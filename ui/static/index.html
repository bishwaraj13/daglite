<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daglite</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Daglite</div>
    <div class="muted">Lightweight workflow engine</div>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Runs</h2>
      <table id="runsTable">
        <thead>
          <tr>
            <th>ID</th><th>Flow</th><th>State</th><th>Created</th><th>Started</th><th>Finished</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Run detail</h2>
      <div id="runMeta" class="muted">Select a run</div>
      <div id="graph"></div>
      <div id="detail"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
